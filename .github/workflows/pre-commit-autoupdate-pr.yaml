name: "pre-commit autoupdate"

on:
  workflow_dispatch:
  schedule:
    - cron: '5 0 8 */3 *'  # every 3 months

jobs:

  update:
    name: "update pre-commit hook versions"
    runs-on: ubuntu-latest
    # does not have permissions

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: install pre-commit
        run: python -m pip install pre-commit
        shell: bash

      - name: pre-commit autoupdate
        run: |
          pre-commit autoupdate --color=never | tee -a .github/pre-commit-autoupdate.log
          cat .github/pre-commit-autoupdate.log > $GITHUB_STEP_SUMMARY

      - name: annotate log
        run: |
          {
            echo
            echo "The .pre-commit-config.yaml file cites several remote repositories at tagged commits."
            echo "Updates are available in the upstream repositories. Check diff for new tags and verify change."
          } >> .github/pre-commit-autoupdate.log

      - uses: actions/upload-artifact@v6
        with:
          path: .pre-commit-config.yaml
          name: new-pre-commit-config
          if-no-files-found: error
          retention-days: 5
          include-hidden-files: true

      - uses: actions/upload-artifact@v6
        with:
          path: .github/pre-commit-autoupdate.log
          name: pre-commit-autoupdate-log
          if-no-files-found: error
          retention-days: 5

  pr:
    # Note: requires enabling "Allow GitHub Actions to create and approve pull requests" in repo at /settings/actions
    name: "make a PR if needed"
    runs-on: ubuntu-latest
    needs: [update]

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v6
        with:
          name: new-pre-commit-config

      - uses: actions/download-artifact@v6
        with:
          name: pre-commit-autoupdate-log

      - name: verify directory contents
        run: ls -R

      # Open a Pull Request if there's changes
      - id: cpr
        name: Open PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: pre-commit-autoupdate
          delete-branch: true
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: '[bot] Update pinned pre-commit hook repositories'
          title: '[bot] pre-commit autoupdate'
          add-paths: .pre-commit-config.yaml
          labels: automated
          body-path: pre-commit-autoupdate.log

      - name: Show message for created Pull Request
        if: ${{ steps.cpr.outputs.pull-request-url && steps.cpr.outputs.pull-request-operation != 'none' }}
        shell: bash
        env:
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          PR_OPERATION: ${{ steps.cpr.outputs.pull-request-operation }}
        run: |
          echo "::notice::${PR_URL} was ${PR_OPERATION}."
