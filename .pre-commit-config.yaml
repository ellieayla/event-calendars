exclude: "out/.*.ical"

repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
        exclude: "^test_data/"
    -   id: end-of-file-fixer
        exclude: "^test_data/"
    -   id: check-yaml
    -   id: check-added-large-files

- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.7
  hooks:
    # Run the linter.
    - id: ruff-check
    # Run the formatter in check & complain mode
    - id: ruff-format
      args: ['--check', '--diff']

- repo: https://github.com/rhysd/actionlint
  rev: v1.7.12
  hooks:
    - id: actionlint
      args: [-pyflakes=, -ignore, SC2086.*Double quote]

-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
    -   id: mypy
        additional_dependencies: [types-python-dateutil>=2.9.0.20260305]

